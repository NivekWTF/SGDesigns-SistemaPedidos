<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cotizador – Refrigeración Ricardos</title>

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
      /* Paleta y base */
      :root{
        --brand:#0a2e5c; /* azul corporativo */
        --ink:#0e1622;
        --border:#b8c2d1;
        --muted:#66768f;

        /* Hoja carta a 96dpi aprox */
        --page-w: 816px;
      }

      html,body,#app{height:100%}
      body{margin:0;font-family:Inter,system-ui,Arial,Helvetica,sans-serif;background:#f3f6fb;color:var(--ink)}
      .container{max-width:var(--page-w);margin:24px auto;padding:24px}
      .sheet{background:#fff;box-shadow:0 10px 30px rgba(10,46,92,.12);border-radius:14px;padding:28px}

      .title{font-weight:800;letter-spacing:.5px;color:var(--brand)}
      .muted{color:var(--muted)}
      .grid{display:grid;gap:16px}
      .row{display:flex;gap:12px;align-items:center}

      input[type="text"],input[type="number"],input[type="date"],textarea{
        width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid var(--border);
        border-radius:10px;font:inherit
      }
      textarea{min-height:88px;resize:vertical}
      button{cursor:pointer;border:1px solid var(--brand);background:var(--brand);color:#fff;padding:10px 14px;border-radius:10px;font-weight:600}
      button.ghost{background:#fff;color:var(--brand)}
      button.flat{background:#eef3fb;border-color:#c9d6ee;color:var(--brand)}
      .toolbar{display:flex;gap:10px;flex-wrap:wrap}
      .boxed{border:1px solid var(--border);border-radius:12px;padding:16px}
      .label{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}

      /* Tabla */
      table{width:100%;border-collapse:collapse}
      th,td{border:1px solid var(--border);padding:8px 10px}
      th{background:#f1f5fb;color:#143a72;font-weight:700;text-align:left}
      td.num{text-align:right}
      td.center{text-align:center}

      /* Encabezado */
      .quote-head{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:start}
      .brand-block{display:flex;gap:12px;align-items:center}
      .brand-logo{width:68px;height:68px;border:1px dashed #c7d2e5;border-radius:12px;display:grid;place-content:center;overflow:hidden;background:#f7f9fd}
      .brand-logo img{max-width:100%;max-height:100%;object-fit:contain}
      .folio-box{border:2px solid var(--ink);border-radius:12px;padding:8px 12px;text-align:right;font-weight:800}
      .big{font-size:28px}

      .section-title{margin:10px 0 2px 0;font-weight:800;color:#143a72}

      /* 🔽 Ajustes para que quepa en una hoja (compacto) */
      .sheet{padding:22px}
      .title.big{font-size:24px}
      th, td{padding:6px 8px;font-size:12px}
      input, textarea{padding:8px 10px;font-size:13px}
      .brand-logo{width:56px;height:56px}
      .folio-box{padding:6px 10px}

      /* Impresión */
      @media print{
        @page{ size: Letter; margin:10mm; }
        body{background:#fff}
        .container{margin:0;padding:0}
        .sheet{
          box-shadow:none;border-radius:0;padding:10mm;
          transform:scale(0.96);
          transform-origin:top left;
          width:calc(100% / 0.96);
        }
        .toolbar, .no-print{display:none!important}
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- En TS debe apuntar a main.ts -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
