version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_BUSINESS_NAME=${VITE_BUSINESS_NAME}
        - VITE_BUSINESS_ADDRESS=${VITE_BUSINESS_ADDRESS}
        - VITE_BUSINESS_PHONE=${VITE_BUSINESS_PHONE}
        - VITE_BUSINESS_LOGO_URL=${VITE_BUSINESS_LOGO_URL}
        - VITE_BUSINESS_SOCIALS=${VITE_BUSINESS_SOCIALS}
    image: sg-pedidos:latest
    restart: unless-stopped

  # optional dev service (uncomment to use)
